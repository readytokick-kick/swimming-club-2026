// ── 상태 ──────────────────────────────────────────────────
let current = 0;
let scores = { 수달: 0, 오리: 0, 거북이: 0, 물개: 0, 나무늘보: 0 };
let selected = new Array(8).fill(null);

// ── 화면 전환 ──────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── 테스트 시작 ────────────────────────────────────────────
function startTest() {
  current = 0;
  scores = { 수달: 0, 오리: 0, 거북이: 0, 물개: 0, 나무늘보: 0 };
  selected = new Array(8).fill(null);
  renderQuestion();
  showScreen('question');
}

// ── 질문 렌더 ──────────────────────────────────────────────
function renderQuestion() {
  const q = QUESTIONS[current];
  const total = QUESTIONS.length;

  document.getElementById('qNum').textContent = `Q${current + 1}`;
  document.getElementById('qCount').textContent = `${current + 1} / ${total}`;
  document.getElementById('progressFill').style.width = `${((current + 1) / total) * 100}%`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('btnPrev').disabled = current === 0;

  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';

  // 답변 순서 섞기 (재현 가능하게 질문 인덱스 기반)
  const shuffled = [...q.answers];

  shuffled.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn' + (selected[current] === ans.type ? ' selected' : '');
    btn.innerHTML = `<img class="answer-emoji" src="${TYPE_IMAGES[ans.type]}" alt="킥킥이" /><span>${ans.text}</span>`;
    btn.onclick = () => selectAnswer(ans.type, btn);
    answersEl.appendChild(btn);
  });
}

// ── 답변 선택 ──────────────────────────────────────────────
function selectAnswer(type, btn) {
  // 이전 선택 취소
  if (selected[current]) {
    scores[selected[current]]--;
  }

  // 새 선택
  selected[current] = type;
  scores[type]++;

  document.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  // 잠깐 후 다음 질문
  setTimeout(() => {
    if (current < QUESTIONS.length - 1) {
      current++;
      renderQuestion();
    } else {
      showResult();
    }
  }, 400);
}

// ── 이전 질문 ──────────────────────────────────────────────
function prevQuestion() {
  if (current > 0) {
    if (selected[current]) {
      scores[selected[current]]--;
      selected[current] = null;
    }
    current--;
    renderQuestion();
  }
}

// ── 결과 계산 ──────────────────────────────────────────────
function showResult() {
  showScreen('loading');

  setTimeout(() => {
    const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
    const r = RESULTS[winner];

    // 테마를 result 전체 화면에 적용
    const resultScreen = document.getElementById('result');
    resultScreen.className = `screen active ${r.heroClass}`;

    document.getElementById('resultHero').className = 'result-hero';
    document.getElementById('resultBadge').textContent = '나의 수영 유형';
    document.getElementById('resultEmoji').src = r.img;
    document.getElementById('resultEmoji').alt = r.name;
    document.getElementById('resultName').textContent = r.name;
    document.getElementById('resultDesc').textContent = r.desc;

    const tagsEl = document.getElementById('resultTags');
    tagsEl.innerHTML = r.tags.map(t =>
      `<span class="result-tag">${t}</span>`
    ).join('');

    const productBtn = document.getElementById('productBtn');
    productBtn.href = r.productUrl;
    productBtn.textContent = `${r.productName} 바로가기`;

    // showScreen 대신 직접 active 처리 (theme class 유지를 위해)
    document.querySelectorAll('.screen').forEach(s => {
      if (s.id !== 'result') s.classList.remove('active');
    });
    window.scrollTo(0, 0);
  }, 1800);
}

// ── 다시하기 ──────────────────────────────────────────────
function retryTest() {
  startTest();
}

// ── 카카오 공유 ───────────────────────────────────────────
function shareKakao() {
  const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const r = RESULTS[winner];

  // ⚠️ 아래 'YOUR_KAKAO_APP_KEY'를 카카오 개발자 콘솔에서 발급받은 JavaScript 앱 키로 교체하세요
  // developers.kakao.com → 내 애플리케이션 → 앱 키 → JavaScript 키
  if (typeof Kakao === 'undefined' || !Kakao.isInitialized()) {
    try {
      Kakao.init('YOUR_KAKAO_APP_KEY');
    } catch(e) {
      alert('카카오 공유 기능을 사용하려면 앱 키 설정이 필요해요.\n(개발자 문의)');
      return;
    }
  }

  Kakao.Share.sendDefault({
    objectType: 'text',
    text: `나의 수영 MBTI는 ${r.emoji} ${r.name}!\n\n${r.desc}\n\n나의 수영 유형은 뭘까? 👇`,
    link: {
      mobileWebUrl: window.location.href,
      webUrl: window.location.href,
    },
    buttonTitle: '나도 테스트하기 🏊'
  });
}

// ── 초기화 ────────────────────────────────────────────────
window.onload = () => {
  if (typeof Kakao !== 'undefined') {
    try { Kakao.init('YOUR_KAKAO_APP_KEY'); } catch(e) {}
  }
};
